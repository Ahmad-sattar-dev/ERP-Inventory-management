# PostgreSQL configuration driven by environment variables so the same file
# works locally and inside Docker (where DATABASE_HOST resolves to `db`).

default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USER", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "apparel_inventory_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "apparel_inventory_test") %>_test

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "apparel_inventory_production") %>
  username: <%= ENV.fetch("DATABASE_USER", "apparel_inventory") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") %>
