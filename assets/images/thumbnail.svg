<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="ruby" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc0000"/>
      <stop offset="100%" style="stop-color:#9b0000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#e94560" opacity="0.1"/>
  <circle cx="1180" cy="540" r="200" fill="#e94560" opacity="0.1"/>
  <circle cx="1100" cy="100" r="80" fill="#4ecca3" opacity="0.1"/>

  <!-- Inventory boxes icon -->
  <g transform="translate(150, 220)">
    <!-- Box 1 -->
    <rect x="0" y="60" width="80" height="80" fill="#4ecca3" rx="8" opacity="0.9"/>
    <rect x="10" y="70" width="60" height="10" fill="#fff" opacity="0.3" rx="2"/>
    <!-- Box 2 -->
    <rect x="90" y="30" width="80" height="110" fill="url(#accent)" rx="8" opacity="0.9"/>
    <rect x="100" y="40" width="60" height="10" fill="#fff" opacity="0.3" rx="2"/>
    <rect x="100" y="55" width="40" height="10" fill="#fff" opacity="0.2" rx="2"/>
    <!-- Box 3 -->
    <rect x="180" y="80" width="80" height="60" fill="#7b68ee" rx="8" opacity="0.9"/>
    <rect x="190" y="90" width="60" height="10" fill="#fff" opacity="0.3" rx="2"/>
    <!-- Barcode lines -->
    <g transform="translate(30, 100)">
      <rect x="0" y="0" width="3" height="25" fill="#fff" opacity="0.7"/>
      <rect x="6" y="0" width="2" height="25" fill="#fff" opacity="0.7"/>
      <rect x="11" y="0" width="4" height="25" fill="#fff" opacity="0.7"/>
      <rect x="18" y="0" width="2" height="25" fill="#fff" opacity="0.7"/>
      <rect x="23" y="0" width="3" height="25" fill="#fff" opacity="0.7"/>
    </g>
  </g>

  <!-- Rails/Ruby gem icon -->
  <g transform="translate(1000, 180)">
    <polygon points="80,0 160,40 160,120 80,160 0,120 0,40" fill="url(#ruby)" opacity="0.8"/>
    <polygon points="80,20 140,50 140,110 80,140 20,110 20,50" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <text x="80" y="90" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">R</text>
  </g>

  <!-- Main Title -->
  <text x="640" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">ERP Inventory</text>
  <text x="640" y="360" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#accent)" text-anchor="middle">Management</text>

  <!-- Subtitle -->
  <text x="640" y="420" font-family="Arial, sans-serif" font-size="24" fill="#a0a0a0" text-anchor="middle">Ruby on Rails Demo for Apparel &amp; Fashion Brands</text>

  <!-- Feature tags -->
  <g transform="translate(340, 480)">
    <rect x="0" y="0" width="160" height="40" rx="20" fill="#4ecca3" opacity="0.2"/>
    <rect x="0" y="0" width="160" height="40" rx="20" fill="none" stroke="#4ecca3" stroke-width="2"/>
    <text x="80" y="26" font-family="Arial, sans-serif" font-size="14" fill="#4ecca3" text-anchor="middle">Inventory</text>
  </g>
  <g transform="translate(520, 480)">
    <rect x="0" y="0" width="160" height="40" rx="20" fill="#e94560" opacity="0.2"/>
    <rect x="0" y="0" width="160" height="40" rx="20" fill="none" stroke="#e94560" stroke-width="2"/>
    <text x="80" y="26" font-family="Arial, sans-serif" font-size="14" fill="#e94560" text-anchor="middle">Order Processing</text>
  </g>
  <g transform="translate(700, 480)">
    <rect x="0" y="0" width="160" height="40" rx="20" fill="#7b68ee" opacity="0.2"/>
    <rect x="0" y="0" width="160" height="40" rx="20" fill="none" stroke="#7b68ee" stroke-width="2"/>
    <text x="80" y="26" font-family="Arial, sans-serif" font-size="14" fill="#7b68ee" text-anchor="middle">Integrations</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1280" height="20" fill="url(#accent)"/>
</svg>
